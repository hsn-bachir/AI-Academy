<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Machine learning Course" />
    <title>Sign up Page</title>
    <script src="https://kit.fontawesome.com/3d7cd03105.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../style/sign.css">

</head>

<body>
    <h1>Sign up your account</h1>
    <p>Please fill out this form with the required information</p>

    <form id="myForm">
        <div class="info">
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" required placeholder="hasan" />
        </div>
        <div class="info">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required placeholder="example@gmail.com" />
        </div>
        <div class="info">
            <label for="password">Password:</label>
            <input id="password" name="password" type="password" pattern="{8,}" required placeholder="********" />
        </div>
        <div class="info">
            <label for="dob">Date of birth:</label>
            <input type="date" name="dob" id="dob" required />
        </div>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById("myForm").addEventListener("submit", function (event) {
            event.preventDefault(); // Prevent form from actually submitting
            alert("Success! Your information has been saved."); // Show success message
            window.location.href = "home.html"; // Redirect to specific page
        });
    </script>
</body>

</html>
